# This workflow packages the verified app.
# It is manual on purpose so Day 1 stays focused on CI.
name: 03 Build Artifact Workflow

on:
  # Students start this workflow manually from the Actions tab.
  workflow_dispatch:

env:
  # Keep common image values in one place so the build steps stay readable.
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  ARTIFACT_NAME: tiny-health-app-image

jobs:
  build-package:
    # Use a fresh GitHub-hosted runner for the build.
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        version_id: [V1,V2]

    steps:
      - name: Check out repository
        # Get the repository files onto the runner.
        uses: actions/checkout@v6

      - name: Fetch Python Version from Secret
        id: get-version
        run: |
          # Dynamically picks PYTHON_V1 or PYTHON_V2
          VERSION=${{ secrets[format('PYTHON_{0}', matrix.version_id)] }}
          echo "selected_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        # Prepare Python so the workflow can run the tests first.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.version_id }}

      - name: Run tests
        # Build only after the verification step passes.
        run: python -m unittest discover -s tests -v

      - name: Set image tag
        # Create one simple tag so the image is easy to identify in this run.
        id: image-tag
        run: |
          IMAGE_TAG="run-${GITHUB_RUN_NUMBER}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: new-Build Docker image with docker build
        uses: docker/build-push-action@v6
        with:
          outputs: type=docker,dest=${{ env.IMAGE_TAR }} 
          tags: ${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}


      - name: Upload build artifact
        # Store the packaged output so a later workflow can use the exact same package.
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.IMAGE_TAR }}
          retention-days: 7
