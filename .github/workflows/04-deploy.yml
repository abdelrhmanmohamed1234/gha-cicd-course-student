name: 03 Build Artifact Workflow

on:
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/03-build-artifact.yml"
  workflow_dispatch:
    inputs:
      python_version:
        description: "Python base image tag"
        default: "3.12-slim"
        required: false

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  ARTIFACT_NAME: tiny-health-app-image
  PYTHON_VERSION: ${{ inputs.python_version || '3.12-slim' }}

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

  build-artifact:
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          outputs: type=docker,dest=${{ env.IMAGE_TAR }}
          tags: ${{ env.IMAGE_NAME }}:run-${{ github.run_number }}
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.IMAGE_TAR }}
          retention-days: 7