name: 04 Deploy Workflow

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of the build workflow to deploy"
        required: true
  workflow_run:
    workflows: ["03 Build Artifact Workflow"]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  deploy-package:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: tiny-health-app-image
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id || inputs.run_id }}
          path: downloaded-artifact

      - name: Show downloaded files
        run: ls -R downloaded-artifact

      - name: Load Docker image
        run: docker load --input downloaded-artifact/tiny-health-app.tar

      - name: Start container
        run: |
          docker run -d \
            --name tiny-health-container \
            -p 8000:8000 \
            "tiny-health-app:run-${{ github.event.workflow_run.run_number || inputs.run_id }}"

      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f tiny-health-container || true