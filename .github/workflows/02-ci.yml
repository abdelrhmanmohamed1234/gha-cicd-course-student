# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

on:

  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:
env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  ARTIFACT_NAME: tiny-health-app-imag    

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v4

      - name: list the repo contenent
        run: ls 

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: show the python version
        run: python --version
      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v
  build_artifact:
    runs-on: ubuntu-latest
    needs: run-tests
    strategy:
      matrix:
        version_id: [V1, V2]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Fetch Python Version from Secre
        id: get-version
        env:
            # Pull the secret based on matrix.version_id (e.g., PYTHON_V1)
          RAW_VERSION: ${{ secrets[format('PYTHON_{0}', matrix.version_id)] }}
        run: |
          # Pass the hidden secret value to the step output
          echo "selected_version=$RAW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Use the output from the fetch step, NOT the matrix
          python-version: ${{ steps.get-version.outputs.selected_version }}

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Set image tag
        id: image-tag
        run: |
          # Include version_id so artifacts are distinct
          echo "image_tag=${{ matrix.version_id }}-run-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          # Export directly to tar file (replaces 'docker save')
          outputs: type=docker,dest=${{ matrix.version_id }}-${{ env.IMAGE_TAR }}
          tags: ${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          # Give each version a unique artifact name
          name: ${{ env.ARTIFACT_NAME }}-${{ matrix.version_id }}
          path: ${{ matrix.version_id }}-${{ env.IMAGE_TAR }}
          retention-days: 7
        

